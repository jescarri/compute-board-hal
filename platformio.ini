; PlatformIO project for the Compute-Board Mini HAL library.
;
; Two environments:
;   esp32dev : compile-check the library + examples for the target board.
;   native   : run the pure-core unit tests on the host with Unity (no hardware,
;              no mocks). The ESP32 driver TU is compiled away by the
;              #if defined(ESP_PLATFORM) guard, so nothing hardware-specific is
;              built here.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
	-std=gnu++14
	-Wall
	-Wextra
build_unflags = -std=gnu++11

; Build/upload a single example to a real board. The example directory is
; selected at build time via the PLATFORMIO_SRC_DIR env var (see the Makefile),
; and this library is pulled in as a dependency via a symlink to the repo root.
[env:example]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = symlink://.
build_flags =
	-std=gnu++14
	-Wall
	-Wextra
build_unflags = -std=gnu++11

[env:native]
platform = native
test_framework = unity
lib_compat_mode = off
; Build the library sources (src/) together with the test runner so the pure
; core (power_plan.cpp) links into the host tests. The ESP32 driver TU compiles
; to nothing on native thanks to its #if defined(ESP_PLATFORM) guard.
test_build_src = yes
build_flags =
	-std=gnu++17
	-Wall
	-Wextra
