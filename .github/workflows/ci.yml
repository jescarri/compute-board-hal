name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'        # semver release tags, e.g. v1.0.0
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PLATFORMIO_CACHE_DIR: ~/.platformio/.cache

jobs:
  # ---------------------------------------------------------------------------
  # Test: host unit tests (no hardware) + target compile-check of lib + examples
  # ---------------------------------------------------------------------------
  test:
    name: Unit tests + compile-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ${{ env.PLATFORMIO_CACHE_DIR }}
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run native unit tests (no hardware, no mocks)
        run: pio test -e native

      - name: Compile-check examples for ESP32 (Arduino)
        run: |
          for ex in examples/*/*.ino; do
            echo "::group::Building $ex"
            pio ci --lib="." --board=esp32dev \
              --project-option="framework=arduino" \
              --project-option="build_flags=-std=gnu++14 -Wall -Wextra" \
              "$ex"
            echo "::endgroup::"
          done

  # ---------------------------------------------------------------------------
  # Format: clang-format must be clean (non-blocking style gate)
  # ---------------------------------------------------------------------------
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check formatting
        run: |
          find src examples test -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.ino' \) \
            -print0 | xargs -0 clang-format --dry-run --Werror

  # ---------------------------------------------------------------------------
  # Release: on a semver tag, pack the library and attach it to a GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Release library
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Validate semver tag and sync library manifests
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          if [[ ! "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not a semver vX.Y.Z tag"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          # Keep library.json / library.properties in step with the tag.
          sed -i -E "s/(\"version\"[[:space:]]*:[[:space:]]*\")[^\"]+/\1$VER/" library.json
          sed -i -E "s/^version=.*/version=$VER/" library.properties

      - name: Pack library tarball
        run: pio pkg pack -o "compute-board-hal-${{ steps.version.outputs.version }}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ComputeBoardHal ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: compute-board-hal-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional: publish to the PlatformIO Registry. Requires a PLATFORMIO_AUTH_TOKEN
      # secret and a globally-unique library name. Enable when ready.
      # - name: Publish to PlatformIO Registry
      #   run: pio pkg publish --non-interactive
      #   env:
      #     PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
