name: Build

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PLATFORMIO_CACHE_DIR: ~/.platformio/.cache

jobs:
  compile-check:
    name: Compile-check examples (ESP32 / Arduino)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ${{ env.PLATFORMIO_CACHE_DIR }}
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Compile-check examples for ESP32 (Arduino)
        run: |
          for ex in examples/*/*.ino; do
            echo "::group::Building $ex"
            # DeepSleepCycle takes its Wi-Fi credentials at compile time and
            # #errors without them; supply placeholders for the compile-check
            # (nothing is flashed).
            creds=""
            case "$ex" in
              *DeepSleepCycle*) creds="-DWIFI_SSID='\"ci\"' -DWIFI_PASS='\"ci\"'" ;;
            esac
            pio ci --lib="." --board=esp32dev \
              --project-option="framework=arduino" \
              --project-option="build_flags=-std=gnu++14 -Wall -Wextra $creds" \
              "$ex"
            echo "::endgroup::"
          done
