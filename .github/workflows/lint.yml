name: Lint

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check formatting
        run: |
          find src examples test -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.ino' \) \
            -print0 | xargs -0 clang-format --dry-run --Werror
