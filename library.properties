sentence=Mini HAL for the custom ESP32 compute-board: VCC_AUX rail control, config-button probe and ultra-low-power deep sleep.
paragraph=Encapsulates the schematic-traced pin map, secondary-rail enable/disable, an active-low config-button probe, and a deep-sleep routine that latches all peripheral I/O into Hi-Z and holds VCC_AUX_ENA LOW for the whole sleep. RTC power domains are configurable and default to all-off.
